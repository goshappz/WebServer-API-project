<!DOCTYPE html>
<html lang="ru">
<head>
    <title>registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
<form class="row g-3 needs-validation"
      novalidate
      method="post"
      action="/register">
    <div class="col-md-4">
        <label for="username" class="form-label">Имя пользователя</label>
        <input type="text" class="form-control" id="username" name="username" value="" required>
        <div class="valid-feedback">
            Looks good!
        </div>
    </div>
    <div class="col-md-4">
      <label for="email" class="form-label">Электронная почта</label>

      <input
        type="email"
        class="form-control {% if email_error %}is-invalid{% endif %}"
        id="email"
        name="email"
        value=""
        required
      >

      {% if email_error %}
        <div class="invalid-feedback">
          {{ email_error }}
        </div>
      {% else %}
        <div class="invalid-feedback">
          Введите корректный email
        </div>
      {% endif %}
    </div>
    <div class="col-md-4">
        <label for="password" class="form-label">Пароль</label>
        <div class="input-group has-validation">
            <input type="password" class="form-control" id="password" name="password" aria-describedby="password-addon"
                   required minlength="6">
            <div class="invalid-feedback">
            </div>
        </div>
    </div>
    <div class="col-12">
        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="terms" name="terms" required>
            <label class="form-check-label" for="terms">
                Согласен с условиями
            </label>
            <div class="invalid-feedback">
                Вы должны быть согласны с условиями пользования
            </div>
        </div>
    </div>
    <div class="col-12">
        <button class="btn btn-primary" type="submit">Submit form</button>
    </div>
</form>
<form class="row g-3 needs-validation" novalidate>
</form>
<script>
    (() => {
      'use strict'

      // Fetch all the forms we want to apply custom Bootstrap validation styles to
      const forms = document.querySelectorAll('.needs-validation')

      // Loop over them and prevent submission
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }

          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>
