<!DOCTYPE html>
<html lang="ru">
<head>
    <title>login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="static/style.css" rel="stylesheet">
</head>
<body>
<div class="container login-page">
    <div class="row justify-content-center">
        <div class="col-lg-4">
            <div class="text-center">
                <div class="up-text d-inline-block bg-primary d-inline-block px-2 py-1 rounded">
                    Войдите в свой аккаунт
                </div>
            </div>
            <form class="needs-validation"
                  novalidate
                  method="post"
                  action="/login">
                <div class="mb-3">
                    <label for="username_or_email" class="form-label">Имя пользователя или адрес почты</label>
                    <input type="text" class="form-control" id="username_or_email" name="username_or_email" value="" required>
                    <div class="valid-feedback">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password_login" class="form-label">Пароль</label>
                    <div class="input-group has-validation">
                        <input type="password" class="form-control" id="password_login" name="password_login"
                               aria-describedby="password-addon"
                               required minlength="6">
                        <div class="invalid-feedback">
                        </div>
                    </div>
                </div>
                <div class="text-center mb-3">
                    <button class="btn btn-primary" type="submit">Войти</button>
                </div>
            </form>
            <a href="/" class="btn btn-outline-primary position-fixed back-btn">
                <i class="bi bi-backspace"></i>
            </a>
        </div>
    </div>
</div>
<script>
    (() => {
      'use strict'

      // Fetch all the forms we want to apply custom Bootstrap validation styles to
      const forms = document.querySelectorAll('.needs-validation')

      // Loop over them and prevent submission
      Array.from(forms).forEach(form => {
        form.addEventListener('submit', event => {
          if (!form.checkValidity()) {
            event.preventDefault()
            event.stopPropagation()
          }

          form.classList.add('was-validated')
        }, false)
      })
    })()
</script>
