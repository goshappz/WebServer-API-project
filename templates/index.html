<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Собаки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="static/style.css" rel="stylesheet" >
</head>
<body>
    <div class="dog-background">
        <div class="собака">
            <h1>Рандомная собака</h1>
            <div class="dog-photo position-relative">
              <img src="{{ image_url }}" class="dog-img rounded">
                <form method="post" action="/save">
                    <input type="hidden" name="image_url" value="{{ image_url }}">
                    <button type="submit" class="btn btn-primary dog-btn position-absolute like">
                        <i class="bi bi-heart"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
    <a href="/" class="btn btn-primary pes">Обновить</a>
    {% if current_user.is_authenticated %}
        <div class="profile">
            <a href="profile" class="btn btn-primary position-fixed top-0 end-0 mt-3 me-3">
                <i class="bi bi-person-circle"> Профиль</i>
            </a>
            <a href="logout" class="btn btn-primary logout-btn">
                <i class="bi bi-person-circle"> Выйти</i>
            </a>
        </div>
    {% else %}
        <div class="login">
            <a href="/login" class="btn btn-outline-primary position-fixed top-0 end-0 mt-3 me-3">
                <i class="bi bi-person"> Войти</i>
            </a>
            <a href="/register" class="btn btn-outline-primary register-btn">
                    <i class="bi bi-person"> Зарегистрироваться</i>
            </a>
        </div>
    {% endif %}
</body>
</html>
