<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="static/style.css" rel="stylesheet" >
</head>
<body>
    <div class="profile-top">
        <div class="pfp">
            <div class="account_name">
            <b> {{ current_user.name }}</b>
            <form method="post" action="/load_pfp">
                <input class="form-control" type="file" name="pfp" accept="image/*" required>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-upload"></i>
                </button>
            </form>
            </div>
        </div>
        <div class="about">
    </div>
    </div>
    <p class="text1">Сохраненные собаки</p>
    <div class="rectangle row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3">
        {% for dog in dogs %}
        <div class="col">
            <div class="card">
                <img src="{{ dog.image_url }}" class="dogs_unpacking">
            </div>
        </div>
        {% endfor %}
    </div>

    <a href="/" class="btn btn-outline-primary position-fixed back-btn">
        <i class="bi bi-backspace"></i>
    </a>
</body>
</html>
